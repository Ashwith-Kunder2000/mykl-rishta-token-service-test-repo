name: Update db-core version

on:
  repository_dispatch:
    types: [core-db-updated]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.env }}
          token: ${{ secrets.DISPATCH_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update db-core version in package.json
        run: |
          VERSION=${{ github.event.client_payload.version }}
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            pkg.dependencies['@Ashwith-Kunder2000/db-core'] = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Commit updated package.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: update db-core to ${{ github.event.client_payload.version }}"
          git push